services:
  - type: web
    name: likes-pdf-backend
    runtime: python
    rootDir: ./backend
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PROJECT_NAME
        value: DocuForge
      - key: DEBUG
        value: "False"
      - key: API_V1_STR
        value: /api/v1
      - key: SECRET_KEY
        value: your-super-secret-key-change-in-production-min-32-chars
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MAX_UPLOAD_SIZE
        value: "104857600"
    buildCommand: "pip install -r requirements.txt"
    plan: free

databases:
  - name: postgres-db
    databaseName: docuforge
    user: postgres
    plan: free
  
  - name: redis-cache
    plan: free
